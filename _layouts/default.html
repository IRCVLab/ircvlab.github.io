<!DOCTYPE html>
<html>

  {% include head.html %}

  <body class="preload">

    <!-- Splash Screen Overlay -->
    <div id="splash" aria-hidden="true" role="presentation">
      <video id="splash-video" class="splash-video" autoplay muted playsinline>
        <source src="{{ site.url }}{{ site.baseurl }}/images/teaser.mov" type="video/quicktime">
        <source src="{{ site.url }}{{ site.baseurl }}/images/teaser.mov" type="video/mp4">
      </video>
    </div>

    {% include header.html %}

    <div class="body-container">
      <div class="container-fluid">
        <div class="row">
          {{ content }}
        </div>
      </div>
    </div>

    {% include footer.html %}

<!-- Global site tag (gtag.js) - Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-14CENTRPZT"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);} 
gtag('js', new Date());
gtag('config', 'G-14CENTRPZT');
</script>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Splash & Typing Logic -->
<script>
(function() {
  var body = document.body;
  var splash = document.getElementById('splash');
  var video = document.getElementById('splash-video');
  var alreadyShown = false;
  try {
    alreadyShown = sessionStorage.getItem('splashShown') === '1';
  } catch (e) {}

  function revealSite() {
    body.classList.remove('preload');
    if (video) { video.pause(); }
    if (splash) {
      splash.style.opacity = '0';
      splash.style.pointerEvents = 'none';
      setTimeout(function() {
        if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      }, 400);
    }
    try { sessionStorage.setItem('splashShown', '1'); } catch (e) {}
  }

  if (alreadyShown) {
    revealSite();
  } else {
    if (splash) splash.style.display = 'flex';
    if (video) {
      video.playbackRate = 3.0;
      video.addEventListener('ended', function() {
        setTimeout(revealSite, 200);
      });
      // Fallback: if video fails to load or play, reveal after 5s
      video.addEventListener('error', revealSite);
      setTimeout(revealSite, 15000);
    } else {
      revealSite();
    }
  }
})();
</script>


  </body>

</html>
